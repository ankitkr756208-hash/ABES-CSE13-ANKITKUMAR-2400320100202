<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Practice</title>
</head>

<body>

<h1 style="color:green">Javascript practice</h1>
<p id="output1">output will come here...</p>
<input type="text" id="inputBox" placeholder="Enter something">
<button onclick="showText()">Show</button>

<hr>

<h1 style="color:green">Add two numbers</h1>
<p id="output">output will come here...</p>
<input type="number" id="addNum1">
<input type="number" id="addNum2">
<button onclick="addNumbers()">Add</button>

<hr>

<h1 style="color:green">Change Text Color</h1>
<button id="abc" onclick="makeGreen()">Make Green</button>

<hr>

<h1 style="color:green">Show alert on Button Click</h1>
<button onclick="sayHello()">Say Hello</button>

<hr>

<h1 style="color:green">Display Length of input Text</h1>
<input type="text" id="box">
<button onclick="textLength()">Count Letters</button>
<p id="abcd"></p>

<hr>

<h1 style="color:green">Reverse a string</h1>
<input type="text" id="box2">
<button onclick="reverseText()">Reverse</button>
<p id="ak"></p>

<hr>

<h1 style="color:green">Click on button pop → name</h1>
<input id="nameInput" type="text">
<button onclick="greet()">Click me</button>

<hr>

<h3>Simple Calculator</h3>
Number 1: <input id="calcNum1" type="number" placeholder="Enter first number"><br><br>
Number 2: <input id="calcNum2" type="number" placeholder="Enter second number"><br><br>

<button onclick="add()">Add</button>
<button onclick="sub()">Subtract</button>
<button onclick="mul()">Multiply</button>
<button onclick="div()">Divide</button>

<p id="result"></p>

<script src="script.js"></script>
</body>
</html>
