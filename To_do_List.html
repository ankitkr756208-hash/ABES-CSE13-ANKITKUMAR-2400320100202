<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"/> 
  <title>Simple To-Do List</title> 
  <style> 
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background-image: url('pad-bg.jpg'); 
      background-size: cover; 
      background-repeat: no-repeat; 
      color: #234; 
      margin: 0; 
      padding: 0; } 
    h2 { font-family: 'Georgia', serif; color: #1572A1; margin: 25px auto; text-align: center;} 
    .todo-box { 
      width: 350px; 
      margin: 26px auto; 
      background: #fff; 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 6px 25px #b8d4e388; } 
    input[type="text"] { 
      width: 70%; 
      padding: 10px; 
      border-radius: 7px; 
      border: 1px solid #9fe7ff; 
      margin-right: 12px; 
      margin-bottom: 20px; 
      font-size: 1rem; } 
    button { 
      padding: 10px 24px; 
      border-radius: 7px; 
      border:none; 
      font-weight: bold; 
      background: #1d6fd2; 
      color:#fff; 
      cursor:pointer; 
      font-size:1rem; } 
    ul { 
      list-style: none; 
      padding: 0; 
      margin-top: 16px; } 
    li { 
      background: #f0faff; 
      margin-bottom: 11px; 
      border-radius: 8px; 
      padding: 10px 18px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      font-size: 1rem; } 
    li button { 
      background: #d11d2b; 
      padding: 4px 15px; 
      border-radius: 6px; 
      border:none; 
      font-size: 0.95rem; 
      color:#fff; 
      cursor:pointer; } 
    a:link    { color: #1d6fd2; text-decoration: none; font-weight: 600; } 
    a:visited { color: #4e3565; } 
    a:hover   { color: #fff; background: #1d6fd2; text-decoration: underline; } 
    a:active  { color: #d11d2b; background: #ffd1d1; } 
  </style> 
</head> 
<body> 
  <h2>My To-Do List</h2> 
  <div class="todo-box"> 
    <input type="text" id="taskInput" placeholder="Enter task..." /> 
    <button onclick="addTask()">Add</button> 
    <ul id="taskList"></ul> 
  </div> 
<script> 
function addTask() { 
  var val = document.getElementById("taskInput").value.trim(); 
  if(!val) return; 
  var ul = document.getElementById("taskList"); 
  var li = document.createElement("li"); 
  li.innerHTML = val + '<button onclick="this.parentNode.remove()">Done</button>'; 
  ul.appendChild(li); 
  document.getElementById("taskInput").value = "";} 
</script> 
</body> 
 
</html>
